name: Deployment

on:
    push:
        branches: [main]

jobs:
    Deploy:
        runs-on: ubuntu-latest
        
        steps:
            - name: Code checkout
              uses: actions/checkout@v4  
            
            - name: Set up node
              uses: actions/setup-node@v4
              with:
                node-version: 22

            - name: Install dependencies
              run: npm ci
            
            - name: Build
              run: npm run build